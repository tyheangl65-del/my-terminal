<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Terminal + AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #131722; color: #d1d4dc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; }
    
    /* Top Bar */
    .topbar { height: 42px; background: #1e222d; border-bottom: 1px solid #2a2e39; display: flex; align-items: center; padding: 0 16px; justify-content: space-between; font-size: 13px; }
    .badge { background: #2962ff; color: white; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; }

    /* Main Container */
    .container { display: flex; height: calc(100vh - 42px); }

    /* Left Watchlist Sidebar */
    .sidebar-left { width: 220px; background: #131722; border-right: 1px solid #2a2e39; display: flex; flex-direction: column; }
    .sidebar-title { padding: 12px; font-weight: bold; border-bottom: 1px solid #2a2e39; font-size: 11px; color: #787b86; text-transform: uppercase; }
    .watchlist-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #1e222d; cursor: pointer; }
    .watchlist-item:hover { background: #1e222d; }
    .symbol-name { font-weight: bold; color: #ffffff; }

    /* Center Chart Viewport */
    .chart-container { flex: 1; height: 100%; position: relative; }
    #tv_chart { height: 100%; width: 100%; }

    /* Right AI Chat Sidebar */
    .sidebar-right { width: 300px; background: #181c27; border-left: 1px solid #2a2e39; display: flex; flex-direction: column; }
    .chat-box { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 13px; }
    .msg { padding: 8px 12px; border-radius: 6px; max-width: 85%; line-height: 1.4; word-break: break-word; }
    .user-msg { background: #2962ff; color: white; align-self: flex-end; }
    .ai-msg { background: #2a2e39; color: #d1d4dc; align-self: flex-start; }
    
    .chat-input-area { padding: 10px; border-top: 1px solid #2a2e39; display: flex; gap: 6px; }
    .chat-input { flex: 1; background: #131722; border: 1px solid #2a2e39; color: white; padding: 8px; border-radius: 4px; outline: none; }
    .send-btn { background: #00e676; border: none; color: black; font-weight: bold; padding: 0 12px; border-radius: 4px; cursor: pointer; }
    .key-input { width: 90%; margin: 8px auto; padding: 6px; background: #131722; border: 1px solid #2a2e39; color: white; border-radius: 4px; font-size: 11px; }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar">
    <div style="display: flex; align-items: center; gap: 10px;">
      <span class="badge">PRO TERMINAL</span>
      <strong id="current-symbol-title">XAUUSD / Gold</strong>
    </div>
    <div><span>Status: </span><strong style="color: #00e676;">Active</strong></div>
  </div>

  <!-- Main View -->
  <div class="container">
    
    <!-- Left Watchlist -->
    <div class="sidebar-left">
      <div class="sidebar-title">Watchlist</div>
      <div class="watchlist-item" onclick="loadSymbol('OANDA:XAUUSD', 'XAUUSD / Gold')">
        <div class="symbol-name">XAUUSD</div>
      </div>
      <div class="watchlist-item" onclick="loadSymbol('BINANCE:BTCUSDT', 'BTCUSDT / Bitcoin')">
        <div class="symbol-name">BTCUSDT</div>
      </div>
      <div class="watchlist-item" onclick="loadSymbol('BINANCE:ETHUSDT', 'ETHUSDT / Ethereum')">
        <div class="symbol-name">ETHUSDT</div>
      </div>
      <div class="watchlist-item" onclick="loadSymbol('FX:EURUSD', 'EURUSD / Euro')">
        <div class="symbol-name">EURUSD</div>
      </div>
    </div>

    <!-- Center Chart -->
    <div class="chart-container" id="chart_box"></div>

    <!-- Right AI Panel -->
    <div class="sidebar-right">
      <div class="sidebar-title">AI Market Assistant</div>
      <input type="password" id="api-key" class="key-input" placeholder="Paste Gemini API Key Here...">
      
      <div class="chat-box" id="chat-box">
        <div class="msg ai-msg">Hello! I'm your Trading Assistant. Paste your API Key above and ask me anything about market strategy or levels.</div>
      </div>

      <div class="chat-input-area">
        <input type="text" id="user-input" class="chat-input" placeholder="Ask AI..." onkeydown="if(event.key==='Enter') sendAI()">
        <button class="send-btn" onclick="sendAI()">Send</button>
      </div>
    </div>

  </div>

  <!-- TradingView Engine -->
  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
  <script type="text/javascript">
    let currentSymbol = "XAUUSD";

    function loadSymbol(symbolName, title) {
      currentSymbol = symbolName;
      document.getElementById('current-symbol-title').innerText = title;
      document.getElementById('chart_box').innerHTML = '<div id="tv_chart"></div>';
      new TradingView.widget({
        "autosize": true,
        "symbol": symbolName,
        "interval": "15",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "container_id": "tv_chart",
        "hide_side_toolbar": false
      });
    }

    // Default Load
    loadSymbol('OANDA:XAUUSD', 'XAUUSD / Gold');

    // AI Query Engine
    async function sendAI() {
      const apiKey = document.getElementById('api-key').value.trim();
      const inputEl = document.getElementById('user-input');
      const chatBox = document.getElementById('chat-box');
      const text = inputEl.value.trim();

      if (!text) return;
      if (!apiKey) {
        alert("Please paste your Google Gemini API Key first!");
        return;
      }

      // Add user message
      chatBox.innerHTML += `<div class="msg user-msg">${text}</div>`;
      inputEl.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;

      // Add loading indicator
      const loadingId = 'load-' + Date.now();
      chatBox.innerHTML += `<div class="msg ai-msg" id="${loadingId}">Analyzing market...</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [{ text: `You are an expert ICT/SMC trading assistant. The user is currently looking at chart: ${currentSymbol}. User question: ${text}` }]
            }]
          })
        });

        const data = await response.json();
        const reply = data.candidates[0].content.parts[0].text;
        document.getElementById(loadingId).innerText = reply;
      } catch (err) {
        document.getElementById(loadingId).innerText = "Error fetching response. Check your API key.";
      }

      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
